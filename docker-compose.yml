services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Sobrepõe o .env local: dentro do contentor o host é o serviço `mongo`
      MONGODB_URL: mongodb://mongo:27017
      MONGODB_DB: ${MONGODB_DB:-nfe_processor}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_JSON: ${LOG_JSON:-true}
      ENABLE_METRICS: ${ENABLE_METRICS:-true}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-15728640}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      GEMINI_BASE_URL: ${GEMINI_BASE_URL:-https://generativelanguage.googleapis.com}
      PDF_CACHE_MAX_ENTRIES: ${PDF_CACHE_MAX_ENTRIES:-256}
      STORE_PROCESSED_METADATA: ${STORE_PROCESSED_METADATA:-true}
      # true por defeito no Compose para testar POST /extract-pdf no Swagger; defina false no .env se quiser desligar
      ENABLE_PDF_EXTRACT_ENDPOINT: ${ENABLE_PDF_EXTRACT_ENDPOINT:-true}
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data:
